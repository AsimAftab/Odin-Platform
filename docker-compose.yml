# Self-hosted Odin Platform: app + MongoDB.
#   1. Generate a secret:  openssl rand -hex 32   (or the node one-liner in README)
#   2. BETTER_AUTH_SECRET=<secret> docker compose up -d
#   3. Open http://localhost:3000 and sign up.
services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      MONGODB_URI: mongodb://mongo:27017/odin
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET (openssl rand -hex 32)}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      MAINTAINER_EMAILS: ${MAINTAINER_EMAILS:-}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo-data:
